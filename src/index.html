<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VoxPad</title>
  <link rel="stylesheet" href="shared.css">
  <link rel="stylesheet" href="buffer.css">
</head>
<body>

</html>
